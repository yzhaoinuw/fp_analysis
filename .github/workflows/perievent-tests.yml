name: Perievent Tests

on:
  push:
    branches:
      - codex/workflow
      - dev
  pull_request:

jobs:
  perievent-tests:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            numpy==1.25.2 \
            pandas==2.1.3 \
            scipy==1.11.3 \
            openpyxl==3.1.5 \
            matplotlib==3.10.7

      - name: Run perievent unittest suite
        run: python -m unittest tests.test_perievent_analysis
